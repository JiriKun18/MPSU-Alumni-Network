<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle - Green -->
  <circle cx="100" cy="100" r="95" fill="#2d5016" stroke="#c5a572" stroke-width="3"/>
  <!-- Outer circle background - Green -->
  <circle cx="100" cy="100" r="98" fill="#2d5016"/>
  
  <!-- Inner circle - darker green -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#c5a572" stroke-width="2"/>
  
  <!-- Mountains background -->
  <path d="M 50 140 L 70 90 L 90 110 L 120 60 L 150 130 L 170 100" fill="none" stroke="#c5a572" stroke-width="2"/>
  <polygon points="50,140 70,90 90,110" fill="#c5a572" opacity="0.3"/>
  <polygon points="90,110 120,60 150,130" fill="#c5a572" opacity="0.3"/>
  
  <!-- Central shield/emblem -->
  <circle cx="100" cy="95" r="25" fill="#ffc107" opacity="0.9"/>
  <path d="M 90 85 L 100 75 L 110 85 L 110 100 Q 100 110 90 100 Z" fill="#2d5016"/>
  
  <!-- Text arc at top -->
  <path id="topArc" d="M 50 100 A 50 50 0 0 1 150 100" fill="none"/>
  <text font-size="12" font-weight="bold" fill="#c5a572" letter-spacing="2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      MOUNTAIN PROVINCE
    </textPath>
  </text>
  
  <!-- Text arc at bottom -->
  <path id="bottomArc" d="M 150 100 A 50 50 0 0 1 50 100" fill="none"/>
  <text font-size="12" font-weight="bold" fill="#c5a572" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      STATE UNIVERSITY 1969
    </textPath>
  </text>
  
  <!-- Year in center -->
  <text x="100" y="130" font-size="10" font-weight="bold" fill="#c5a572" text-anchor="middle">1969</text>
</svg>
