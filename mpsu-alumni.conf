<VirtualHost *:80>
    DocumentRoot "d:/alumni system/public"
    ServerName mpsu-alumni.local
    ServerAlias *.mpsu-alumni.local mpsu-alumni.test
    
    <Directory "d:/alumni system/public">
        AllowOverride All
        Require all granted
        
        # Allow access from all devices on local network
        Order allow,deny
        Allow from all
    </Directory>
    
    # Enable access from any IP on local network
    <RequireAll>
        Require all granted
    </RequireAll>
</VirtualHost>
